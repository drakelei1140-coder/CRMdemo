<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPay CRM 后台 Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <header class="page-head">
        <div class="page-head-left">
          <div class="breadcrumb">首页 / 仪表盘</div>
          <h1 class="page-title">KPay CRM 后台 Demo</h1>
          <p class="page-subtitle">统一导航、统一组件、统一信息架构的评审演示环境。</p>
        </div>
      </header>

      <div class="grid-2">
        <section class="card"><h3>对象管理入口</h3><p>通过左侧菜单进入企业管理、商铺管理、商户管理，默认均从列表页进入。</p></section>
        <section class="card"><h3>状态视图入口</h3><p>已签约 / 取消签约 / 拒绝签约使用状态列表 + 详情模式，操作权限按状态收敛。</p></section>
        <section class="card"><h3>审核与流程入口</h3><p>修改待审核、商户进件、O/S补件均以列表为主入口，详情中保留完整上下文与时间轴。</p></section>
        <section class="card"><h3>配置与说明入口</h3><p>字段映射、合同映射、通道管理在菜单中保留；功能说明从页面右上角按钮进入。</p></section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
