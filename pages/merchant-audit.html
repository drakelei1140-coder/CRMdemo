<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>商户审核页</title><link rel="stylesheet" href="../styles.css"/></head><body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">商户管理 / 商户审核</div><h1 class="page-title">商户审核 - MID-882193</h1></div><div class="page-actions"><button class="btn" data-open-supplement>补件</button><button class="btn primary" id="approve-btn">审核通过</button><button class="btn danger">审核驳回</button><button class="btn danger" id="reject-sign-btn">拒绝签约</button></div></header><section class="card"><div class="status-strip"><div class="metric"><div class="label">商户启用状态</div><div class="value">--</div></div><div class="metric"><div class="label">商户审核状态</div><div class="value"><span class="badge warning">待审核</span></div></div><div class="metric"><div class="label">关联企业审核状态</div><div class="value" id="c-status">待审核</div></div><div class="metric"><div class="label">关联商铺审核状态</div><div class="value" id="s-status">审核通过</div></div></div></section><section class="card"><h3>商户资料</h3><p>展示内容与商户详情页一致（演示页复用）。</p></section><section class="card"><h3>修改记录时间轴</h3><div class="timeline" id="audit-timeline"><div class="timeline-item"><strong>2026-04-11 09:20</strong><span>提交审核。</span></div></div></section></main></div><div class="modal-mask" id="supplement-modal"><div class="modal"><h3>补件</h3><div class="form-item"><label>补件内容</label><textarea class="input"></textarea></div><div class="modal-actions"><button class="btn" data-close-modal>关闭</button><button class="btn primary" id="confirm-supplement">确认</button></div></div></div><div class="modal-mask" id="approve-modal"><div class="modal"><h3>请确认商户关联的企业和商铺已经审核通过</h3><div class="modal-actions"><button class="btn" data-close-approve>关闭</button><button class="btn primary" id="confirm-approve">确认</button></div></div></div><div class="modal-mask" id="reject-modal"><div class="modal"><h3>将拒绝关联的所有商户的签约，是否拒绝？</h3><div class="modal-actions"><button class="btn" data-close-reject>关闭</button><button class="btn danger" data-close-reject>确认</button></div></div></div><script src="../app.js"></script><script>document.querySelector('[data-open-supplement]').onclick=function(){document.getElementById('supplement-modal').style.display='flex';};document.querySelectorAll('#supplement-modal [data-close-modal]').forEach(function(b){b.onclick=function(){document.getElementById('supplement-modal').style.display='none';};});document.getElementById('confirm-supplement').onclick=function(){document.getElementById('supplement-modal').style.display='none';var item=document.createElement('div');item.className='timeline-item';item.innerHTML='<strong>2026-04-13 10:10</strong><span>reviewer_03 发起补件：请补充企业审核结论。</span>';document.getElementById('audit-timeline').prepend(item);};document.getElementById('approve-btn').onclick=function(){document.getElementById('approve-modal').style.display='flex';};document.querySelector('[data-close-approve]').onclick=function(){document.getElementById('approve-modal').style.display='none';};document.getElementById('confirm-approve').onclick=function(){if(document.getElementById('c-status').textContent!=='审核通过'||document.getElementById('s-status').textContent!=='审核通过'){alert('拦截：关联企业或商铺未审核通过，不能审核通过商户');return;}document.getElementById('approve-modal').style.display='none';};document.getElementById('reject-sign-btn').onclick=function(){document.getElementById('reject-modal').style.display='flex';};document.querySelectorAll('[data-close-reject]').forEach(function(b){b.onclick=function(){document.getElementById('reject-modal').style.display='none';};});</script></body></html>
