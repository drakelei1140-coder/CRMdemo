<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>企业审核页</title><link rel="stylesheet" href="../styles.css"/></head><body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">企业管理 / 企业审核</div><h1 class="page-title">企业审核 - CID-100238</h1></div><div class="page-actions"><button class="btn" data-open-supplement>补件</button><button class="btn primary">审核通过</button><button class="btn danger">审核驳回</button></div></header><section class="card"><div class="status-strip"><div class="metric"><div class="label">企业启用状态</div><div class="value">--</div></div><div class="metric"><div class="label">企业审核状态</div><div class="value"><span class="badge warning">待审核</span></div></div></div></section><section class="card"><h3>企业资料</h3><p>展示内容与企业详情页一致（演示页复用）。</p></section><section class="card"><h3>修改记录时间轴</h3><div class="timeline" id="audit-timeline"><div class="timeline-item"><strong>2026-04-11 09:20</strong><span>提交审核。</span></div></div></section></main></div><div class="modal-mask" id="supplement-modal"><div class="modal"><h3>补件</h3><div id="supplement-list"><div class="form-item"><label>补件内容</label><input class="input" placeholder="请输入补件内容"/></div></div><button class="btn" id="add-supplement">新增一条</button><div class="modal-actions"><button class="btn" data-close-modal>关闭</button><button class="btn primary" id="confirm-supplement">确认</button></div></div></div><script src="../app.js"></script><script>document.querySelector('[data-open-supplement]').onclick=function(){document.getElementById('supplement-modal').style.display='flex';};document.querySelectorAll('#supplement-modal [data-close-modal]').forEach(function(b){b.onclick=function(){document.getElementById('supplement-modal').style.display='none';};});document.getElementById('add-supplement').onclick=function(){var div=document.createElement('div');div.className='form-item';div.innerHTML='<label>补件内容</label><input class="input" placeholder="请输入补件内容"/>';document.getElementById('supplement-list').appendChild(div);};document.getElementById('confirm-supplement').onclick=function(){document.getElementById('supplement-modal').style.display='none';var item=document.createElement('div');item.className='timeline-item';item.innerHTML='<strong>2026-04-13 10:00</strong><span>reviewer_01 发起补件：请补充证件文件。</span>';document.getElementById('audit-timeline').prepend(item);};</script></body></html>
