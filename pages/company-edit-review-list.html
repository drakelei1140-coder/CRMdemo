<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>企业资料修改待审核列表</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">修改待审核 / 企业资料</div><h1 class="page-title">企业资料修改待审核</h1><p class="page-subtitle">筛选结构对齐企业管理列表，可直接发起审核操作。</p></div></header>
<section class="toolbar" data-collapse-mode="rows"><input class="input" placeholder="CID / 企业名称 / 申请单号"/><select><option>企业类型：全部</option><option>有限公司</option><option>个人独资</option></select><select><option>审核状态：全部</option><option>待审核</option><option>已通过</option><option>已驳回</option></select><select><option>风险等级：全部</option><option>低</option><option>中</option><option>高</option></select><select><option>营业状态：全部</option><option>营业中</option><option>停业</option></select><input class="input" placeholder="联系电话"/><select><option>更新时间：近30天</option><option>近90天</option></select><button class="btn">查询</button><button class="btn">重置</button><button class="btn" data-filter-toggle>展开筛选</button></section>
<section class="table-wrap"><table><thead><tr><th>申请单号</th><th>CID</th><th>企业名称</th><th>发起方</th><th>发起时间</th><th>状态</th><th>操作</th></tr></thead><tbody><tr><td>REV-C-240410-05</td><td>CID-100238</td><td>星河数字科技（香港）有限公司</td><td>CE</td><td>2026-04-10 14:20</td><td><span class="badge warning">待审核</span></td><td><a href="company-edit-review.html">查看详情</a> | <button class="btn text" data-open-review-modal>审核</button></td></tr></tbody></table></section></main></div>
<div class="modal-mask" id="review-audit-modal"><div class="modal"><h3>审核</h3><div class="form-item"><label class="form-required">审核结果</label><select><option>请选择</option><option>审核通过</option><option>驳回</option></select></div><div class="form-item"><label>审核意见（最多500字）</label><textarea class="input" maxlength="500" placeholder="请输入审核意见"></textarea></div><div class="modal-actions"><button class="btn primary">提交</button><button class="btn" data-close-modal>关闭</button></div></div></div>
<script src="../app.js"></script></body></html>
