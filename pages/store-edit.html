<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>编辑商铺</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">商户管理 / 编辑商铺</div><h1 class="page-title">编辑商铺</h1><p class="page-subtitle">仅包含人工录入/维护字段，终端设备通过独立组件发起申请。</p></div><div class="page-actions"><button class="btn">保存草稿</button><button class="btn primary" id="submit-audit-btn">提交审核</button></div></header>
<section class="card"><h3>对象信息</h3><div class="grid-2"><div class="form-item"><label>商铺对象ID</label><input class="input" value="SID-330019" readonly/></div></div></section><section class="card"><h3>商铺基础信息</h3><div class="grid-2"><div class="form-item"><label class="form-required">商铺中文名称</label><input class="input" value="星河商城·观塘店"/></div><div class="form-item"><label>商铺英文名称</label><input class="input" value="Star River Mall - Kwun Tong"/></div><div class="form-item"><label class="form-required">所属企业（CID）</label><select><option>CID-100238 | 星河数字科技（香港）有限公司</option></select></div><div class="form-item"><label class="form-required">门店类型</label><select><option>零售门店</option><option>餐饮门店</option><option>线上门店</option></select></div><div class="form-item"><label>联络语言</label><select><option>中文</option><option>English</option></select></div><div class="form-item"><label>商户营业状态</label><select><option>经营中</option><option>筹备中</option><option>停业</option></select></div><div class="form-item"><label>门店联系电话</label><input class="input" value="+852 3188 6621"/></div><div class="form-item"><label>门店联系邮箱</label><input class="input" value="store.kt@starriver.hk"/></div><div class="form-item"><label>特殊业务属性标签</label><input class="input" value="高客单价;旅游场景"/></div><div class="form-item"><label>AFP Store业务说明</label><input class="input" value="线下门店收单"/></div></div></section>
<section class="card"><h3>门店地址信息</h3><div class="grid-2"><div class="form-item"><label>主要营业地址（中文）</label><input class="input" value="香港九龍觀塘開源道81號地舖"/></div><div class="form-item"><label>主要营业地址（英文）</label><input class="input" value="G/F, 81 Hoi Yuen Road, Kwun Tong"/></div><div class="form-item"><label>门店营业地址原始全文</label><textarea class="input">香港九龍觀塘開源道81號地下A鋪</textarea></div><div class="form-item"><label>营业铺位</label><input class="input" value="G/F Shop A"/></div><div class="form-item"><label>城市</label><input class="input" value="香港"/></div><div class="form-item"><label>州/省</label><input class="input" value="九龙"/></div><div class="form-item"><label>邮政编码</label><input class="input" value="999077"/></div><div class="form-item"><label>营业国家/地区</label><input class="input" value="HK / 九龙"/></div><div class="form-item"><label>地址行1/2/3</label><input class="input" value="81 Hoi Yuen Road / Shop A / -"/></div><div class="form-item"><label>营业地址证明</label><input class="input" type="file"/></div></div></section>
<section class="card"><h3>终端设备（独立组件）</h3><div class="notice">终端设备不在表单中直接平铺。请通过组件发起：新增设备（生成加机申请单）/减少设备（生成回收申请单）。</div><div style="margin-top:10px;"><button class="btn" data-open-device-panel>打开终端设备组件</button></div></section>
<section class="card"><h3>线上资料与门店文件</h3><div class="grid-2"><div class="form-item"><label>Website(Desktop)</label><input class="input" value="https://store.starriver.hk"/></div><div class="form-item"><label>Website(Mobile)</label><input class="input" value="https://m.starriver.hk"/></div><div class="form-item"><label>APP(Android)</label><input class="input" value="-"/></div><div class="form-item"><label>APP(IOS)</label><input class="input" value="-"/></div><div class="form-item"><label>Facebook</label><input class="input" value="facebook.com/starrivermall"/></div><div class="form-item"><label>Instagram</label><input class="input" value="@starrivermall"/></div><div class="form-item"><label>Openrice</label><input class="input" value="-"/></div><div class="form-item"><label>H5经营网址</label><input class="input" value="https://h5.starriver.hk/kt"/></div><div class="form-item"><label>商店logo</label><input class="input" type="file"/></div><div class="form-item"><label>私隐政策</label><input class="input" type="file"/></div><div class="form-item"><label>产品目录</label><input class="input" type="file"/></div><div class="form-item"><label>送货政策</label><input class="input" type="file"/></div></div></section>
<section class="card"><h3>门店经营特征</h3><div class="grid-2"><div class="form-item"><label>每宗交易平均金额</label><input class="input" value="420"/></div><div class="form-item"><label>每宗交易最大交易额</label><input class="input" value="28000"/></div><div class="form-item"><label>预计每年交易宗数</label><input class="input" value="180000"/></div><div class="form-item"><label>过去拒付比例</label><input class="input" value="0.16%"/></div><div class="form-item"><label>拒付平均处理日数</label><input class="input" value="5"/></div><div class="form-item"><label>过去退款比例</label><input class="input" value="1.8%"/></div><div class="form-item"><label>退款平均处理日数</label><input class="input" value="2"/></div><div class="form-item"><label>平均每月营业额</label><input class="input" value="1800000"/></div><div class="form-item"><label>经营方式</label><input class="input" value="线下门店"/></div><div class="form-item"><label>提前收款日数</label><input class="input" value="1"/></div><div class="form-item"><label>货物/服务最短送达时间</label><input class="input" value="即时"/></div><div class="form-item"><label>货物/服务最长送达时间</label><input class="input" value="7天"/></div><div class="form-item"><label>退货政策</label><textarea class="input">7天内可退换，需保留小票。</textarea></div><div class="form-item"><label>退货政策截图</label><input class="input" type="file"/></div></div></section>

</main></div><div class="modal-mask" id="submit-audit-modal"><div class="modal"><h3>修改申请数据已经提交至商铺资料修改待审核功能中，请前往查看或审核</h3><div class="modal-actions"><button class="btn" data-close-modal>关闭</button></div></div></div>
<div class="modal-mask" id="channel-profile-modal"><div class="modal"><h3>终端设备申请组件</h3><div class="grid-2"><div class="form-item"><label>动作类型</label><select><option>新增设备（加机申请单）</option><option>减少设备（回收申请单）</option></select></div><div class="form-item"><label>设备类型</label><select><option>POS机</option><option>底座</option><option>展示牌</option></select></div><div class="form-item"><label>数量</label><input class="input" value="2"/></div><div class="form-item"><label>备注</label><input class="input" value="开业活动备机"/></div></div><div class="modal-actions"><button class="btn" data-close-modal>取消</button><a class="btn primary" href="store-device-order-detail.html">提交申请</a></div></div></div>
<script src="../app.js"></script><script>var b=document.getElementById("submit-audit-btn");if(b){b.onclick=function(e){e.preventDefault();document.getElementById("submit-audit-modal").style.display="flex";};document.querySelectorAll("#submit-audit-modal [data-close-modal]").forEach(function(i){i.onclick=function(){document.getElementById("submit-audit-modal").style.display="none";};});}</script></body></html>
