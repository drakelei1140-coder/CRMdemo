<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>编辑商铺</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">商户管理 / 编辑商铺</div><h1 class="page-title">编辑商铺</h1><p class="page-subtitle">编辑场景反显 SID/CID 只读，设备组件支持加机与回收。</p></div><div class="page-actions"><button class="btn">保存草稿</button><button class="btn primary">提交审核</button></div></header>
<section class="card"><h3>对象标识（只读）</h3><div class="grid-2"><div class="form-item"><label>SID</label><input class="input" value="SID-330019" readonly/></div><div class="form-item"><label>CID</label><input class="input" value="CID-100238" readonly/></div></div></section>
<section class="card"><h3>商铺基础信息</h3><div class="grid-2"><div class="form-item"><label class="form-required">商铺中文名称</label><input class="input" value="星河商城·观塘店"/></div><div class="form-item"><label>商铺英文名称</label><input class="input" value="Star River Mall - Kwun Tong"/></div><div class="form-item"><label>门店联系电话</label><input class="input" value="+852 3188 6621"/></div><div class="form-item"><label>门店联系邮箱</label><input class="input" value="store.kt@starriver.hk"/></div></div></section>
<section class="card"><h3>门店地址信息</h3><div class="grid-2"><div class="form-item"><label>主要营业地址（中文）</label><input class="input" value="香港九龍觀塘開源道81號地舖"/></div><div class="form-item"><label>主要营业地址（英文）</label><input class="input" value="G/F, 81 Hoi Yuen Road, Kwun Tong"/></div><div class="form-item"><label>城市</label><input class="input" value="香港"/></div><div class="form-item"><label>州/省</label><input class="input" value="九龙"/></div></div></section>
<section class="card"><h3>终端设备（独立组件）</h3><div class="notice">编辑商铺支持加机与回收，提交后生成对应审批单。</div><button class="btn" data-open-device-panel>打开终端设备组件</button></section>
<section class="card"><h3>线上资料与经营特征</h3><div class="grid-2"><div class="form-item"><label>Website(Desktop)</label><input class="input" value="https://store.starriver.hk"/></div><div class="form-item"><label>H5经营网址</label><input class="input" value="https://h5.starriver.hk/kt"/></div><div class="form-item"><label>每宗交易平均金额</label><input class="input" value="420"/></div><div class="form-item"><label>平均每月营业额</label><input class="input" value="1800000"/></div></div></section>
</main></div>
<div class="modal-mask" id="channel-profile-modal"><div class="modal"><h3>终端设备申请组件（编辑商铺）</h3><div class="grid-2"><div class="form-item"><label>动作类型</label><select><option>新增设备（加机申请单）</option><option>减少设备（回收申请单）</option></select></div><div class="form-item"><label>设备类型</label><select><option>POS机</option><option>底座</option><option>展示牌</option></select></div><div class="form-item"><label>数量</label><input class="input" value="2"/></div><div class="form-item"><label>备注</label><input class="input"/></div></div><div class="modal-actions"><button class="btn" data-close-modal>关闭</button><a class="btn primary" href="store-device-order-detail.html">提交申请</a></div></div></div>
<script src="../app.js"></script></body></html>
