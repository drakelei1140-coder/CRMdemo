<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>新增商铺</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">商户管理 / 新增商铺</div><h1 class="page-title">新增商铺</h1><p class="page-subtitle">新增场景不展示 SID，终端设备组件仅支持加机。</p></div><div class="page-actions"><button class="btn">保存草稿</button><button class="btn primary">提交审核</button></div></header>
<section class="card"><h3>商铺基础信息</h3><div class="grid-2"><div class="form-item"><label class="form-required">商铺中文名称</label><input class="input"/></div><div class="form-item"><label class="form-required">所属企业（CID）</label><select><option>CID-100238 | 星河数字科技（香港）有限公司</option></select></div><div class="form-item"><label>门店联系电话</label><input class="input"/></div><div class="form-item"><label>门店联系邮箱</label><input class="input"/></div></div></section>
<section class="card"><h3>门店地址信息</h3><div class="grid-2"><div class="form-item"><label>主要营业地址（中文）</label><input class="input"/></div><div class="form-item"><label>主要营业地址（英文）</label><input class="input"/></div><div class="form-item"><label>城市</label><input class="input"/></div><div class="form-item"><label>州/省</label><input class="input"/></div></div></section>
<section class="card"><h3>终端设备（独立组件）</h3><div class="notice">新增商铺时只允许加机，不显示回收设备操作。</div><button class="btn" data-open-device-panel>打开终端设备组件</button></section>
</main></div>
<div class="modal-mask" id="channel-profile-modal"><div class="modal"><h3>终端设备申请组件（新增商铺）</h3><div class="grid-2"><div class="form-item"><label>动作类型</label><input class="input" value="新增设备（加机申请单）" readonly/></div><div class="form-item"><label>设备类型</label><select><option>POS机</option><option>底座</option></select></div><div class="form-item"><label>数量</label><input class="input" value="1"/></div><div class="form-item"><label>备注</label><input class="input"/></div></div><div class="modal-actions"><button class="btn" data-close-modal>关闭</button><a class="btn primary" href="store-device-order-detail.html">提交申请</a></div></div></div>
<script src="../app.js"></script></body></html>
