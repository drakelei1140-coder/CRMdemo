<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>编辑商户</title><link rel="stylesheet" href="../styles.css"/></head><body><div class="layout"><aside class="sidebar"></aside><main class="main"><header class="page-head"><div class="page-head-left"><div class="breadcrumb">商户管理 / 商户审核 / 编辑</div><h1 class="page-title">编辑商户</h1><p class="page-subtitle">先选择企业，再选择该企业下商铺；企业/商铺新增均新标签打开。</p></div><div class="page-actions"><button class="btn">保存草稿</button><button class="btn primary">提交审核</button></div></header>
<section class="card"><h3>商户信息（MID表）</h3><div class="grid-2"><div class="form-item"><label class="form-required">商户名称</label><input class="input" value="星河商城收单主体" placeholder="请输入商户名称"/></div><div class="form-item"><label class="form-required">进件通道</label><select><option>Adyen_AFP</option><option>Stripe_AFP</option></select></div><div class="form-item"><label class="form-required">渠道编码</label><input class="input" value="CHN-AFP-HK-01"/></div><div class="form-item"><label class="form-required">服务编码</label><input class="input" value="SVC-PAYMENT-01"/></div><div class="form-item"><label>结算币种</label><select><option>HKD</option><option>USD</option></select></div><div class="form-item"><label>结算账户</label><input class="input" placeholder="请输入结算账户"/></div></div></section>
<section class="card"><h3>企业数据（CID表）</h3><div class="page-actions" style="margin-bottom:10px;"><a class="btn" href="company-create.html" target="_blank" rel="noopener">新增</a></div><div class="grid-2"><div class="form-item"><label class="form-required">选择企业</label><select id="merchant-company-select"><option value="">请选择企业</option><option value="CID-100238" selected>CID-100238 | 星河数字科技（香港）有限公司</option><option value="CID-100310">CID-100310 | 北极星商贸（香港）有限公司</option></select></div><div class="form-item"><label>CID</label><input class="input" id="merchant-cid" readonly value="CID-100238"/></div></div><table class="field-table" style="margin-top:10px;"><tr><th>商戶中文名稱</th><td id="company-name">星河数字科技（香港）有限公司</td></tr><tr><th>商戶英文名稱</th><td id="company-en">Star River Digital Technology (HK) Limited</td></tr><tr><th>MCC Code</th><td id="company-mcc">5311</td></tr><tr><th>公司電話</th><td id="company-phone">+852 3188 2211</td></tr></table></section>
<section class="card"><h3>商铺数据（SID表）</h3><div class="page-actions" style="margin-bottom:10px;"><a class="btn" id="new-store-link" href="store-create.html" target="_blank" rel="noopener">新增</a></div><div class="grid-2"><div class="form-item"><label class="form-required">选择商铺</label><select id="merchant-store-select"><option value="">请先选择企业</option><option data-company="CID-100238" value="SID-330019" selected>SID-330019 | 星河商城·观塘店</option><option data-company="CID-100238" value="SID-330031">SID-330031 | 星河商城·铜锣湾店</option><option data-company="CID-100310" value="SID-440012">SID-440012 | 北极星旗舰店</option></select></div><div class="form-item"><label>SID</label><input class="input" id="merchant-sid" readonly value="SID-330019"/></div></div><table class="field-table" style="margin-top:10px;"><tr><th>商铺中文名称</th><td id="store-name">星河商城·观塘店</td></tr><tr><th>主要营业地址（中文）</th><td id="store-address">香港九龍觀塘開源道81號地舖</td></tr><tr><th>门店联系电话</th><td id="store-phone">+852 3188 6621</td></tr><tr><th>门店状态</th><td id="store-status">经营中</td></tr></table></section>
<section class="card"><h3>AFP / 通道信息（MID侧）</h3><div class="grid-2"><div class="form-item"><label>Account Holder 参考号</label><input class="input" placeholder="可选"/></div><div class="form-item"><label>Balance Account 参考号</label><input class="input" placeholder="可选"/></div><div class="form-item"><label>Business Line 参考号</label><input class="input" placeholder="可选"/></div><div class="form-item"><label>Payment Method</label><select><option>Card</option><option>FPS</option></select></div></div></section>
</main></div><script src="../app.js"></script><script>
(function(){
  var cSel=document.getElementById('merchant-company-select');
  var sSel=document.getElementById('merchant-store-select');
  var newStore=document.getElementById('new-store-link');
  var companyData={"CID-100238":{name:"星河数字科技（香港）有限公司",en:"Star River Digital Technology (HK) Limited",mcc:"5311",phone:"+852 3188 2211"},"CID-100310":{name:"北极星商贸（香港）有限公司",en:"Polaris Trading (HK) Limited",mcc:"5499",phone:"+852 3988 6611"}};
  var storeData={"SID-330019":{name:"星河商城·观塘店",address:"香港九龍觀塘開源道81號地舖",phone:"+852 3188 6621",status:"经营中"},"SID-330031":{name:"星河商城·铜锣湾店",address:"香港銅鑼灣軒尼詩道500號",phone:"+852 3188 6622",status:"待审核"},"SID-440012":{name:"北极星旗舰店",address:"香港旺角彌敦道688號",phone:"+852 3988 6644",status:"经营中"}};
  cSel.addEventListener('change',function(){var cid=cSel.value;document.getElementById('merchant-cid').value=cid||'--';var c=companyData[cid]||{};document.getElementById('company-name').textContent=c.name||'--';document.getElementById('company-en').textContent=c.en||'--';document.getElementById('company-mcc').textContent=c.mcc||'--';document.getElementById('company-phone').textContent=c.phone||'--';newStore.href=cid?('store-create.html?cid='+encodeURIComponent(cid)):'store-create.html';sSel.disabled=!cid;sSel.value='';Array.from(sSel.options).forEach(function(opt){if(!opt.dataset.company)return;opt.hidden=cid?opt.dataset.company!==cid:true;});document.getElementById('merchant-sid').value='--';document.getElementById('store-name').textContent='--';document.getElementById('store-address').textContent='--';document.getElementById('store-phone').textContent='--';document.getElementById('store-status').textContent='--';});
  sSel.addEventListener('change',function(){var sid=sSel.value;document.getElementById('merchant-sid').value=sid||'--';var s=storeData[sid]||{};document.getElementById('store-name').textContent=s.name||'--';document.getElementById('store-address').textContent=s.address||'--';document.getElementById('store-phone').textContent=s.phone||'--';document.getElementById('store-status').textContent=s.status||'--';});
})();
</script></body></html>
